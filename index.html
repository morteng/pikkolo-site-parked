<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pikkolo</title>
  <meta name="robots" content="noindex">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d10;
      --fg: #e6e8ec;
      --muted: #8a92a1;
      --accent: #f59e0b;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      display: grid;
      place-items: center;
      padding: 2rem;
      line-height: 1.55;
    }
    main {
      max-width: 36rem;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: clamp(2.5rem, 6vw, 3.75rem);
      margin: 0 0 1rem 0;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .dot {
      color: var(--accent);
    }
    .lang {
      margin-top: 2.5rem;
      padding-top: 2rem;
      border-top: 1px solid #1f242c;
      color: var(--muted);
    }
    .lang p { margin: 0.5rem 0; }
    .meta {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #4a5160;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <h1>Pikkolo<span class="dot">.</span></h1>
    <p>Tjenesten er midlertidig nede.</p>
    <div class="lang">
      <p>This service is temporarily offline.</p>
    </div>
    <p class="meta">pikkolo.site</p>
  </main>
</body>
</html>
